<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Join Tour — TripToe</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; text-align: center; padding: 60px 24px; color: #333; max-width: 400px; margin: 0 auto; }
    img { height: 80px; margin-bottom: 24px; }
    h1 { font-size: 24px; color: #1A4B7D; margin-bottom: 8px; }
    p { font-size: 16px; color: #666; margin-bottom: 32px; }
    .btn { display: block; width: 100%; padding: 14px; border-radius: 12px; font-size: 16px; font-weight: 600; text-decoration: none; margin-bottom: 12px; box-sizing: border-box; background: #1A4B7D; color: white; }
    .note { font-size: 13px; color: #999; margin-top: 24px; }
  </style>
</head>
<body>
  <img src="/triptoe-long.png" alt="TripToe">
  <h1>Join This Tour</h1>
  <p>Your guide is using TripToe for live coordination. Download the app to join.</p>
  <a id="download-btn" class="btn" href="https://play.google.com/store/apps/details?id=com.triptoe.mobile">Download TripToe</a>
  <p class="note">After installing, open the app to join — no need to scan again.</p>
  <script>
    // Encode the tour session id into the Play Store referrer parameter so
    // the freshly-installed app can pick it up via the Install Referrer API
    // and route the user straight to the booking. Falls back to a plain
    // Play Store link if the path doesn't match the expected pattern.
    (function () {
      var match = window.location.pathname.match(/^\/s\/(\d+)$/);
      if (!match) return;
      var tourSessionId = match[1];
      var referrer = encodeURIComponent('tour_session_id=' + tourSessionId);
      document.getElementById('download-btn').href =
        'https://play.google.com/store/apps/details?id=com.triptoe.mobile&referrer=' + referrer;
    })();
  </script>
</body>
</html>
